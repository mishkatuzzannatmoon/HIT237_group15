<!DOCTYPE html>
<html>
<head>
    <title>Flagged Anomalies</title>
</head>
<body>
    <h1>Flagged Anomalies</h1>

    {% if anomalies %}
        {% for anomaly in anomalies %}
            <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                <p><strong>Recording:</strong> {{ anomaly.recording }}</p>
                <p><strong>Reason:</strong> {{ anomaly.get_reason_display }}</p>
                <p><strong>Status:</strong> {{ anomaly.get_status_display }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No flagged anomalies available.</p>
    {% endif %}
</body>
</html>
