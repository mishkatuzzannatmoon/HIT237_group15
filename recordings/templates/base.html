<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}NT Wildlife Recording System{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #f4f6f8;
            color: #333;
        }
        nav {
            background-color: #2c7a7b;
            padding: 12px 40px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        nav a:hover { background-color: rgba(255,255,255,0.2); }
        nav .brand {
            font-size: 16px;
            font-weight: bold;
            margin-right: 16px;
        }
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        h2 { color: #2c3e50; margin-bottom: 16px; }
        .button {
            display: inline-block;
            padding: 8px 16px;
            background-color: #2c7a7b;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .button:hover { background-color: #245f60; }
        .button-sm {
            display: inline-block;
            padding: 4px 10px;
            background-color: #2c7a7b;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
        }
        .button-danger {
            background-color: #c0392b;
        }
        .button-danger:hover { background-color: #a93226; }
        .button-secondary {
            background-color: #7f8c8d;
        }
        .card {
            background-color: white;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .card h3 { margin-bottom: 8px; }
        .card p { margin: 4px 0; font-size: 14px; color: #555; }
        .card .actions { margin-top: 12px; display: flex; gap: 8px; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-red { background-color: #fdecea; color: #c0392b; }
        .badge-orange { background-color: #fef3e2; color: #d35400; }
        .badge-yellow { background-color: #fef9e7; color: #b7950b; }
        .badge-green { background-color: #eafaf1; color: #1e8449; }
        .badge-gray { background-color: #f2f3f4; color: #555; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        th {
            background-color: #2c7a7b;
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
        }
        td { padding: 10px 16px; border-bottom: 1px solid #ecf0f1; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f9f9f9; }
        form label { display: block; margin-bottom: 4px; font-size: 14px; font-weight: bold; }
        form input, form select, form textarea {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        form input[type="checkbox"] { width: auto; }
        form button[type="submit"] {
            padding: 10px 20px;
            background-color: #2c7a7b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        form button[type="submit"]:hover { background-color: #245f60; }
        .messages { margin-bottom: 16px; }
        .message { padding: 10px 16px; border-radius: 4px; margin-bottom: 8px; font-size: 14px; }
        .message-success { background-color: #eafaf1; color: #1e8449; }
        .message-error { background-color: #fdecea; color: #c0392b; }
        .empty { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'recording_list' %}" class="brand">NT Wildlife Recording System</a>
        <a href="{% url 'recording_list' %}">Recordings</a>
        <a href="{% url 'species_list' %}">Species</a>
        <a href="{% url 'anomaly_list' %}">Anomalies</a>
    </nav>
    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message message-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
