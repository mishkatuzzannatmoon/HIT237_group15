<!DOCTYPE html>
<html>
<head>
    <title>Upload Recording</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 40px;
            background-color: #f4f6f8;
            color: #333;
        }

        h1 {
            color: #2c3e50;
        }

        .form-box {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 16px;
            background-color: #2c7a7b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #245f60;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #2c7a7b;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Upload Recording</h1>
    <p>This page will be used to add a new wildlife recording.</p>

    <div class="form-box">
        <form>
            <p>Species:</p>
            <input type="text" name="species">

            <p>Date:</p>
            <input type="date" name="date">

            <p>Location:</p>
            <input type="text" name="location">

            <p>Confidence Score:</p>
            <input type="number" name="confidence_score">

            <button type="submit">Save Recording</button>
        </form>
    </div>

    <a href="{% url 'recording_list' %}">Back to Recording List</a>
</body>
</html>
